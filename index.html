<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart AI Gate Entry</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js"></script>
  
  <style>
    :root {
      --bg-dark: #09090b;
      --card-bg: rgba(24, 24, 27, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-cyan: #22d3ee;
      --accent-purple: #c084fc;
      --accent-grad: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #d946ef 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.3);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(217, 70, 239, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
      z-index: 2;
    }

    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 28px;
      padding: 45px 30px;
      box-shadow: var(--shadow-glow), inset 0 1px 0 rgba(255,255,255,0.1);
      border: 1px solid var(--card-border);
      position: relative;
    }

    /* Steps & Transitions */
    .step-container {
      display: none;
      animation: floatIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .step-container.active { display: block; }
    
    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Orb / AI Visualizer */
    .ai-orb-container {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ai-orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--accent-grad);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #fff;
      z-index: 10;
      transition: all 0.3s ease;
    }
    
    .ai-orb-container.listening .ai-orb {
      animation: orbBreathe 1.5s ease-in-out infinite alternate;
    }
    .ai-orb-container.listening::before,
    .ai-orb-container.listening::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid var(--accent-cyan);
      animation: rippleDark 2s linear infinite;
      z-index: 1;
    }
    .ai-orb-container.listening::after {
      animation-delay: 1s;
      border-color: var(--accent-purple);
    }

    @keyframes orbBreathe {
      0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
      100% { transform: scale(1.1); box-shadow: 0 0 50px rgba(217, 70, 239, 0.8), inset 0 0 20px rgba(255,255,255,0.5); }
    }
    @keyframes rippleDark {
      0% { width: 80px; height: 80px; opacity: 1; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    .message-box {
      background: rgba(0, 0, 0, 0.3);
      padding: 20px 24px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 25px;
      font-size: 1.15rem;
      font-weight: 500;
      text-align: center;
      color: var(--text-main);
      line-height: 1.6;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    /* Inputs */
    .input-wrapper {
      position: relative;
      margin-bottom: 25px;
      display: none; 
    }
    .modern-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 20px;
      color: #fff;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      text-align: center;
      font-weight: 500;
    }
    .modern-input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.6);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.15);
    }
    .modern-input::placeholder { color: #64748b; }
    
    .prefix {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent-cyan);
      font-weight: 600;
      pointer-events: none;
    }
    .with-prefix {
      padding-left: 100px;
      text-align: left;
    }

    /* Dropdown customization for dark mode */
    select.modern-input {
      appearance: none;
      -webkit-appearance: none;
    }
    select.modern-input option {
      background: #1e293b;
      color: #fff;
    }

    /* Buttons */
    .btn-primary-elegant {
      background: var(--accent-grad);
      color: white;
      border: none;
      padding: 16px 24px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1.15rem;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
    }
    .btn-primary-elegant:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.6);
    }
    .btn-secondary-elegant {
      background: rgba(255,255,255,0.05);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: none;
    }
    .btn-secondary-elegant:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    /* Action Grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    .action-box {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 25px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      color: var(--text-main);
      font-weight: 500;
    }
    .action-box:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--accent-purple);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.2);
    }
    .action-box i {
      font-size: 2.2rem;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
      display: block;
    }

    /* Camera */
    #camera-container {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      display: none;
      margin-bottom: 25px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    #video { width: 100%; display: block; }
    #canvas { display: none; }

    /* Loader */
    .general-loader {
      display: none;
      text-align: center;
      margin: 25px 0;
    }
    .spinner {
      width: 45px; height: 45px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-cyan);
      border-right-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .brand-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .brand-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 1.05rem;
      font-weight: 400;
      margin-bottom: 35px;
    }

    /* Mic specific floating button */
    .floating-mic {
      position: absolute;
      bottom: -35px;
      left: 50%;
      transform: translateX(-50%);
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: var(--bg-dark);
      border: 2px solid var(--card-border);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--text-muted);
      z-index: 20;
      cursor: pointer;
      transition: all 0.3s;
    }
    .floating-mic.active-mic {
      background: var(--accent-grad);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.6);
      animation: pulseMic 1.5s infinite;
    }
    @keyframes pulseMic {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.1); }
      100% { transform: translateX(-50%) scale(1); }
    }
  </style>
</head>
<body>

  <input type="hidden" id="entryDateRaw" value="">

  <div class="app-container">
    <div class="main-card">
      
      <!-- Welcome Screen -->
      <div class="step-container active" id="step-0">
        <div class="ai-orb-container" id="orb-0">
          <div class="ai-orb"><i class="fas fa-fingerprint"></i></div>
        </div>
        <div class="brand-title">AI Gate Entry</div>
        <div class="brand-subtitle">Neuro-Linked Smart Assistant</div>

        <button class="btn-primary-elegant mt-4" onclick="startProcess()">
          <i class="fas fa-power-off"></i> Initialize AI
        </button>

        <div class="general-loader" id="init-loader" style="display: none; margin-top: 25px;">
          <div class="spinner"></div>
          <div style="color: var(--accent-cyan); font-size: 1rem; font-weight: 500;">Establishing Neural Link...</div>
        </div>
      </div>

      <!-- STEP 1: PO Number -->
      <div class="step-container" id="step-1">
        <div class="ai-orb-container" id="orb-1">
          <div class="ai-orb"><i class="fas fa-wave-square"></i></div>
        </div>
        <div class="message-box" id="msg-po">
          Please state the Vendor PO Number. <br><small style="color: var(--accent-cyan); font-weight: 400;">(Prefix RKD-25/ is automatic)</small>
        </div>
        
        <div class="input-wrapper" id="wrap-po">
          <span class="prefix">RKD-25/</span>
          <input type="text" id="inputPO" class="modern-input with-prefix" placeholder="Example: 399" autocomplete="off">
        </div>

        <div class="input-wrapper" id="wrap-select-po" style="display: none;">
          <select id="selectPO" class="modern-input" onchange="document.getElementById('inputPO').value = this.value">
            <option value="">Select PO from list</option>
          </select>
        </div>

        <div class="d-flex gap-3 mt-4" id="actions-po" style="display: none !important;">
          <button class="btn-primary-elegant btn-secondary-elegant w-50" onclick="startVoicePO()">
            <i class="fas fa-undo"></i> Retry
          </button>
          <button class="btn-primary-elegant w-50" onclick="confirmPO()">
            Confirm <i class="fas fa-check"></i>
          </button>
        </div>
        
        <div class="floating-mic" id="btn-mic-po" onclick="startVoicePO()">
          <i class="fas fa-microphone"></i>
        </div>
      </div>

      <!-- STEP 2: Invoice Capture -->
      <div class="step-container" id="step-2">
        <div class="ai-orb-container" id="orb-2">
          <div class="ai-orb"><i class="fas fa-file-invoice"></i></div>
        </div>
        <div class="message-box" id="msg-inv">
          Please provide the Invoice Number.<br><span style="font-size: 0.95rem; font-weight: 400; color: #94a3b8;">Scan the document or dictate via voice.</span>
        </div>

        <div class="action-grid" id="inv-actions">
          <div class="action-box" onclick="startCamera()">
            <i class="fas fa-camera"></i>
            Scan Invoice
          </div>
          <div class="action-box" onclick="startVoiceInvoice()">
            <i class="fas fa-microphone"></i>
            Use Voice
          </div>
        </div>

        <div id="camera-container">
          <video id="video" autoplay playsinline></video>
          <button class="btn-primary-elegant" style="border-radius: 0; padding: 20px; font-size: 1.25rem;" onclick="captureImage()">
            <i class="fas fa-crosshairs"></i> Extract Data
          </button>
        </div>
        <canvas id="canvas"></canvas>

        <div class="general-loader" id="ocr-loader">
          <div class="spinner"></div>
          <div style="color: var(--accent-cyan); font-weight: 500;">Analyzing Document...</div>
        </div>

        <div class="input-wrapper mt-4" id="wrap-inv">
          <input type="text" id="inputInvoice" class="modern-input" placeholder="Enter Invoice Number" autocomplete="off">
        </div>

        <div class="d-flex gap-3 mt-4" id="actions-inv" style="display: none !important;">
          <button class="btn-primary-elegant btn-secondary-elegant w-50" onclick="prevStep(1)">
            Back
          </button>
          <button class="btn-primary-elegant w-50" id="btn-submit" onclick="submitForm()">
            Submit <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURATION
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKdY9GfOLJ-RnjMDNhdHJhQAiP7PyQsQzEtqTAvD16RxcAhRKASZLoW36kP--5gYN1/exec';

    // System State
    let speechRecog = null;
    let videoStream = null;
    let worker = null;
    let validVendorPOs = [];

    document.addEventListener("DOMContentLoaded", async () => {
      initSpeechRecognition();
      
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const MM = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      document.getElementById("entryDateRaw").value = `${dd}-${MM}-${yyyy}`;

      initTesseract();
      fetchVendorPOs();
    });

    async function fetchVendorPOs() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'GET',
          redirect: 'follow'
        });
        const data = await response.json();
        if (data.success && data.vendorPOs) {
          validVendorPOs = data.vendorPOs;
          const selectEl = document.getElementById("selectPO");
          selectEl.innerHTML = '<option value="">Manual Select (P.O. not found)</option>';
          validVendorPOs.forEach(po => {
            let displayPO = po.replace("RKD-25/", "");
            selectEl.innerHTML += `<option value="${displayPO}">${po}</option>`;
          });
        }
      } catch (e) {
        console.error("Failed to fetch PO list", e);
      }
    }

    async function initTesseract() {
      try {
        worker = await Tesseract.createWorker('eng');
      } catch (e) {
        console.error("Tesseract init failed", e);
      }
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        speechRecog = new SR();
        speechRecog.continuous = false;
        speechRecog.interimResults = false;
        speechRecog.lang = 'hi-IN'; 
      }
    }

    let availableVoices = [];
    window.speechSynthesis.onvoiceschanged = () => {
      availableVoices = window.speechSynthesis.getVoices();
    };

    function speakText(text) {
      return new Promise((resolve) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'hi-IN'; 
          u.pitch = 1.05; 
          u.rate = 0.95; 
          
          if (availableVoices.length === 0) {
            availableVoices = window.speechSynthesis.getVoices();
          }
          
          let bestVoice = availableVoices.find(v => v.lang === 'hi-IN' && (v.name.includes('Online') || v.name.includes('Natural') || v.name.includes('Google') || v.name.includes('Premium')));
          if (!bestVoice) bestVoice = availableVoices.find(v => v.lang.includes('hi'));
          
          if (bestVoice) u.voice = bestVoice;
          
          u.onend = () => resolve();
          u.onerror = () => resolve();

          window.speechSynthesis.speak(u);
          
          setTimeout(resolve, 5000);
        } else {
          resolve();
        }
      });
    }

    function showStep(step) {
      document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
    }
    
    function prevStep(step) {
      stopCamera();
      if(speechRecog) speechRecog.stop();
      
      if(step === 1) {
          startVoicePO();
      }
      
      showStep(step);
    }

    function startProcess() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
        return Swal.fire('Setup Incomplete', 'Please update the SCRIPT_URL in the code.', 'error');
      }
      
      if (validVendorPOs.length === 0) {
        document.getElementById('init-loader').style.display = 'block';
        fetchVendorPOs().then(() => {
          document.getElementById('init-loader').style.display = 'none';
          showStep(1);
          setTimeout(startVoicePO, 300);
        });
      } else {
        showStep(1);
        setTimeout(startVoicePO, 300);
      }
    }

    function validatePO(fullPoString) {
      if (validVendorPOs.length === 0) return true; 
      return validVendorPOs.includes(fullPoString);
    }

    // Step 1: PO Voice
    async function startVoicePO() {
      if (!speechRecog) return Swal.fire('Error', 'Voice input not supported.', 'error');
      
      const orb = document.getElementById("orb-1");
      const msg = document.getElementById("msg-po");
      const wrap = document.getElementById("wrap-po");
      const wrapSelect = document.getElementById("wrap-select-po");
      const actions = document.getElementById("actions-po");
      const micBtn = document.getElementById("btn-mic-po");

      wrap.style.display = 'none';
      wrapSelect.style.display = 'none';
      actions.style.setProperty('display', 'none', 'important');
      
      orb.classList.remove('listening');
      micBtn.style.display = 'flex';
      micBtn.classList.remove('active-mic');
      msg.innerHTML = "AI is speaking...";
      
      await speakText("Aapka swagat hai. Kripya apna vendor P O number batayein.");
      
      orb.classList.add('listening');
      micBtn.classList.add('active-mic');
      msg.innerHTML = "Listening... Please state the PO Number.";

      speechRecog.onresult = (event) => {
        let transcript = event.results[0][0].transcript.trim();
        let cleanText = transcript.replace(/[^a-zA-Z0-9-]/g, '').toUpperCase();
        
        if(cleanText.includes("RKD25")) cleanText = cleanText.replace("RKD25", "");
        if(cleanText.startsWith("25")) cleanText = cleanText.substring(2);
        if(cleanText.startsWith("/")) cleanText = cleanText.substring(1);
        if(cleanText.startsWith("-")) cleanText = cleanText.substring(1);

        document.getElementById("inputPO").value = cleanText;
        document.getElementById("selectPO").value = cleanText;
        
        micBtn.style.display = 'none';
        actions.style.setProperty('display', 'flex', 'important');
        
        const fullPO = "RKD-25/" + cleanText;
        
        if (!validatePO(fullPO)) {
          msg.innerHTML = `PO Number: <b>${fullPO}</b><br><span style="color:var(--accent-purple);">Warning: PO not found. Please select manually.</span>`;
          speakText("Lagta hai ye P O number galat hai. Kripya list mein se sahi P O number chun lijiye.");
          wrap.style.display = 'none';
          wrapSelect.style.display = 'block';
        } else {
          msg.innerHTML = `PO Number: <b>${fullPO}</b><br>Is this correct?`;
          speakText("P O number " + cleanText + " mila hai. Agar sahi hai toh kripya pushti karein.");
          wrap.style.display = 'block';
          wrapSelect.style.display = 'none';
        }
      };
      
      speechRecog.onerror = (event) => {
        micBtn.style.display = 'none';
        wrap.style.display = 'none';
        wrapSelect.style.display = 'block';
        actions.style.setProperty('display', 'flex', 'important');
        msg.innerHTML = `Voice unclear (${event.error}). Please select from list.`;
        speakText("Maaf kijiye main sun nahi payi. Kripya list se apna P O number chuniye.");
      };
      
      speechRecog.onend = () => { 
        orb.classList.remove('listening'); 
        micBtn.classList.remove('active-mic');
      };
      
      try { speechRecog.start(); } catch(e) {}
    }

    function confirmPO() {
      const val = document.getElementById("inputPO").value.trim();
      if (!val) {
        speakText("Aapne koi P O number nahi daala hai.");
        return Swal.fire('Error', 'Please enter a PO Number.', 'warning');
      }
      
      const fullPO = "RKD-25/" + val;
      if (validVendorPOs.length > 0 && !validatePO(fullPO)) {
        document.getElementById("wrap-po").style.display = 'none';
        document.getElementById("wrap-select-po").style.display = 'block';
        speakText("Yeh ek galat P O number hai.");
        return Swal.fire('Invalid PO', 'The entered PO number does not exist in the database.', 'error');
      }
      
      showStep(2);
    }

    // Step 2: Invoice
    async function startVoiceInvoice() {
      if (!speechRecog) return Swal.fire('Error', 'Voice input not supported.', 'error');
      
      stopCamera();
      document.getElementById('camera-container').style.display = 'none';
      document.getElementById('inv-actions').style.display = 'none';
      document.getElementById('wrap-inv').style.display = 'none';
      document.getElementById('actions-inv').style.setProperty('display', 'none', 'important');
      
      const orb = document.getElementById("orb-2");
      const msg = document.getElementById("msg-inv");

      orb.classList.remove('listening');
      msg.innerHTML = "AI is speaking...";
      
      await speakText("Ab kripya apna Invoice number batayein.");
      
      orb.classList.add('listening');
      msg.innerHTML = "Listening for Invoice Number...";
      
      speechRecog.onresult = (event) => {
        let text = event.results[0][0].transcript.trim().toUpperCase().replace(/\s+/g, '');
        document.getElementById("inputInvoice").value = text;
        
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        msg.innerHTML = `Invoice Number: <b>${text}</b>.<br>Please edit if necessary.`;
        
        let readAloud = text.split('').join(' ');
        speakText("Invoice number, " + readAloud + ", prapt hua hai. Kripya ise submit karein.");
      };
      
      speechRecog.onerror = (event) => {
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        document.getElementById('inv-actions').style.display = 'grid';
        msg.innerHTML = `Voice unclear (${event.error}). Please type manually.`;
        speakText("Main invoice number samajh nahi payi. Kripya type kijiye.");
      };

      speechRecog.onend = () => { orb.classList.remove('listening'); };
      
      try { speechRecog.start(); } catch(e) {}
    }

    // Camera & OCR
    async function startCamera() {
      document.getElementById('inv-actions').style.display = 'none';
      const container = document.getElementById('camera-container');
      const video = document.getElementById('video');
      const msg = document.getElementById('msg-inv');
      
      container.style.display = 'block';
      msg.innerHTML = "Bring the invoice number into frame and press 'Extract Data'.";
      speakText("Kripya invoice ko camera ke theek saamne rakhein.");

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = videoStream;
      } catch (err) {
        container.style.display = 'none';
        document.getElementById('inv-actions').style.display = 'grid';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        Swal.fire('Error', 'Camera access failed.', 'error');
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
    }

    async function captureImage() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      stopCamera();
      document.getElementById('camera-container').style.display = 'none';
      
      let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
        data[i] = data[i+1] = data[i+2] = brightness;
      }
      ctx.putImageData(imgData, 0, 0);

      performOCR(canvas.toDataURL('image/jpeg'));
    }

    async function performOCR(base64) {
      document.getElementById('ocr-loader').style.display = 'block';
      document.getElementById('msg-inv').innerHTML = "Scanning invoice, please wait...";
      speakText("Main invoice scan kar rahi hoon, bas ek second.");

      try {
        if (!worker) await initTesseract();
        const { data: { text } } = await worker.recognize(base64);
        
        document.getElementById('ocr-loader').style.display = 'none';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        
        const cleaned = text.split(/\s+/).reduce((a, b) => (/\d/.test(b) && b.length > a.length) ? b : a, "").replace(/[^a-zA-Z0-9-]/g, '').toUpperCase();
        
        document.getElementById("inputInvoice").value = cleaned;
        document.getElementById('msg-inv').innerHTML = `Invoice Number found: <b>${cleaned}</b>.<br>Please edit if necessary.`;
        
        let readAloud = cleaned.split('').join(' ');
        speakText("Invoice scan ho gaya hai. Number mila hai, " + readAloud + ". Agar sahi hai toh submit dabayein.");

      } catch (err) {
        document.getElementById('ocr-loader').style.display = 'none';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        Swal.fire('Error', 'Failed to read invoice, please type manually.', 'warning');
        speakText("Maaf kijiye scan fail ho gaya, kripya ise manually type kar lijiye.");
      }
    }

    function submitForm() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
        return Swal.fire('Setup Incomplete', 'Developer: Please update SCRIPT_URL in index.html.', 'error');
      }

      const date = document.getElementById("entryDateRaw").value;
      const poSuffix = document.getElementById("inputPO").value.trim();
      const invoice = document.getElementById("inputInvoice").value.trim();
      
      if (!poSuffix || !invoice) {
        speakText("Kripya dono details bhar dijiye.");
        return Swal.fire('Error', 'Please enter all details.', 'error');
      }
      
      const fullPO = "RKD-25/" + poSuffix;
      if (validVendorPOs.length > 0 && !validatePO(fullPO)) {
        speakText("Aapka chuna hua P O number galat hai.");
        return Swal.fire('Invalid PO', 'The entered PO number does not exist in the database.', 'error');
      }

      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      speakText("Aapka data save kiya jaa raha hai.");

      const payload = { entryDate: date, vendorPO: fullPO, invoiceNumber: invoice, email: "System User" };

      fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow', 
        body: JSON.stringify(payload),
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        }
      })
      .then(response => {
        if (!response.ok && response.type !== 'opaque') {
            throw new Error("Network error");
        }
        return response.text();
      })
      .then(text => {
        let res = { success: true }; 
        try { if(text) res = JSON.parse(text); } catch(e) {}
        
        btn.disabled = false;
        btn.innerHTML = 'Submit <i class="fas fa-paper-plane"></i>';
        if(res.success) {
          speakText("Aapki Gate entry safaltapoorvak darj ho gayi hai.");
          Swal.fire({ 
            icon: 'success', 
            title: 'Success!', 
            text: 'Gate Entry recorded.', 
            confirmButtonColor: '#8b5cf6',
            background: '#18181b',
            color: '#fff'
          }).then(() => { location.reload(); });
        } else {
          speakText("Server error aaya hai.");
          Swal.fire('Error', res.message || "Submission failed", 'error');
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.innerHTML = 'Submit <i class="fas fa-paper-plane"></i>';
        speakText("Entry darj ho gayi hai.");
        Swal.fire({ 
          icon: 'success', 
          title: 'Submitted', 
          text: 'Request sent to server', 
          confirmButtonColor: '#8b5cf6',
          background: '#18181b',
          color: '#fff'
        }).then(() => { location.reload(); });
      });
    }
  </script>
