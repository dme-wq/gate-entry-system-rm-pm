<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gate Entry System</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js"></script>

  <style>
    :root {
      --bg-light: #f4f7f6;
      --card-bg: #ffffff;
      --accent: #1d4ed8;
      --accent-hover: #1e3a8a;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border-color: #e5e7eb;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }

    .main-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 35px 25px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
      border: 1px solid var(--border-color);
      position: relative;
    }

    /* Steps */
    .step-container {
      display: none;
      animation: fadeIn 0.3s ease forwards;
    }

    .step-container.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* AI Icon / Assistant */
    .assistant-icon {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #eff6ff;
      color: var(--accent);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 2px solid #bfdbfe;
      position: relative;
    }

    .assistant-icon.listening::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      animation: ripple 1.5s infinite;
    }

    @keyframes ripple {
      0% {
        transform: scale(0.9);
        opacity: 1;
      }

      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    .message-box {
      background: #f8fafc;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      margin-bottom: 25px;
      font-size: 1.05rem;
      font-weight: 500;
      text-align: center;
      color: var(--text-main);
      line-height: 1.5;
    }

    /* Inputs */
    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
      display: none;
      /* Hidden by default */
    }

    .modern-input {
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text-main);
      font-size: 1.1rem;
      transition: 0.2s;
      text-align: center;
      font-weight: 500;
    }

    .modern-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
    }

    .prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-weight: 500;
      pointer-events: none;
    }

    .with-prefix {
      padding-left: 90px;
      text-align: left;
    }

    /* Buttons */
    .btn-primary-elegant {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 1.05rem;
      width: 100%;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary-elegant:hover {
      background: var(--accent-hover);
    }

    .btn-secondary-elegant {
      background: #ffffff;
      color: var(--text-main);
      border: 1px solid #d1d5db;
    }

    .btn-secondary-elegant:hover {
      background: #f9fafb;
    }

    .mic-btn {
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 64px;
      height: 64px;
      border: none;
      font-size: 1.5rem;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(29, 78, 216, 0.3);
      transition: 0.2s;
    }

    .mic-btn:active {
      transform: scale(0.95);
    }

    .mic-btn.active-mic {
      background: #dc2626;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    /* Action Grid */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .action-box {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      background: #ffffff;
      color: var(--text-main);
      font-weight: 500;
    }

    .action-box:hover {
      border-color: var(--accent);
      background: #eff6ff;
    }

    .action-box i {
      font-size: 1.8rem;
      color: var(--accent);
      margin-bottom: 12px;
      display: block;
    }

    /* Camera */
    #camera-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    #video {
      width: 100%;
      display: block;
    }

    #canvas {
      display: none;
    }

    /* Loader */
    .general-loader {
      display: none;
      text-align: center;
      margin: 20px 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .brand-title {
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .brand-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <input type="hidden" id="entryDateRaw" value="">

  <div class="app-container">
    <div class="main-card">

      <!-- Welcome Screen -->
      <div class="step-container active" id="step-0">
        <div class="assistant-icon" style="background: #ffffff; border: none; font-size: 3rem;"><i
            class="fas fa-building text-primary"></i></div>
        <div class="brand-title">Gate Entry System</div>
        <div class="brand-subtitle">Smart Assistant for RM/PM</div>

        <div class="input-wrapper" style="display: block; margin-top: 20px;">
          <input type="text" id="userName" class="modern-input" placeholder="Enter Your Name (Optional)"
            autocomplete="off">
        </div>

        <button class="btn-primary-elegant mt-4" onclick="startProcess()">
          <i class="fas fa-microphone"></i> Start Gate Entry
        </button>

        <div class="general-loader" id="init-loader" style="display: none; margin-top: 15px;">
          <div class="spinner"></div>
          <div style="color: var(--text-muted); font-size: 0.9rem;">Initializing System...</div>
        </div>
      </div>

      <!-- STEP 1: PO Number -->
      <div class="step-container" id="step-1">
        <div class="assistant-icon" id="icon-po"><i class="fas fa-headset"></i></div>
        <div class="message-box" id="msg-po">
          Please state the Vendor PO Number. <br><small class="text-muted">(Prefix RKD-25/ is automatic)</small>
        </div>

        <button class="mic-btn" id="btn-mic-po" onclick="startVoicePO()" style="display: none;">
          <i class="fas fa-microphone"></i>
        </button>

        <div class="input-wrapper" id="wrap-po">
          <span class="prefix">RKD-25/</span>
          <input type="text" id="inputPO" class="modern-input with-prefix" placeholder="Example: 399"
            autocomplete="off">
        </div>

        <div class="d-flex gap-2 mt-3" id="actions-po" style="display: none !important;">
          <button class="btn-primary-elegant btn-secondary-elegant w-50" onclick="startVoicePO()">
            <i class="fas fa-undo"></i> Retry
          </button>
          <button class="btn-primary-elegant w-50" onclick="confirmPO()">
            Confirm <i class="fas fa-check"></i>
          </button>
        </div>
      </div>

      <!-- STEP 2: Invoice Capture -->
      <div class="step-container" id="step-2">
        <div class="assistant-icon" id="icon-inv"><i class="fas fa-file-invoice"></i></div>
        <div class="message-box" id="msg-inv">
          Please provide the Invoice Number.<br>You can capture an image or use your voice.
        </div>

        <div class="action-grid" id="inv-actions">
          <div class="action-box" onclick="startCamera()">
            <i class="fas fa-camera"></i>
            Capture Image
          </div>
          <div class="action-box" onclick="startVoiceInvoice()">
            <i class="fas fa-microphone" style="color: #ef4444;"></i>
            Use Voice
          </div>
        </div>

        <div id="camera-container">
          <video id="video" autoplay playsinline></video>
          <button class="btn-primary-elegant" style="border-radius: 0; padding: 16px;" onclick="captureImage()">
            <i class="fas fa-camera"></i> Take Photo
          </button>
        </div>
        <canvas id="canvas"></canvas>

        <div class="general-loader" id="ocr-loader">
          <div class="spinner"></div>
          <div style="color: var(--accent); font-weight: 500;">Scanning Invoice Number...</div>
        </div>

        <div class="input-wrapper mt-3" id="wrap-inv">
          <input type="text" id="inputInvoice" class="modern-input" placeholder="Enter Invoice Number"
            autocomplete="off">
        </div>

        <div class="d-flex gap-2 mt-3" id="actions-inv" style="display: none !important;">
          <button class="btn-primary-elegant btn-secondary-elegant w-50" onclick="prevStep(1)">
            Back
          </button>
          <button class="btn-primary-elegant w-50" id="btn-submit" onclick="submitForm()">
            Submit <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURATION: Paste your Google Apps Script Web App API URL here
    // ==========================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKdY9GfOLJ-RnjMDNhdHJhQAiP7PyQsQzEtqTAvD16RxcAhRKASZLoW36kP--5gYN1/exec';

    // System State
    let speechRecog = null;
    let videoStream = null;
    let worker = null;
    let validVendorPOs = [];

    document.addEventListener("DOMContentLoaded", async () => {
      initSpeechRecognition();

      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const MM = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      document.getElementById("entryDateRaw").value = `${dd}-${MM}-${yyyy}`;

      initTesseract();
      fetchVendorPOs();
    });

    async function fetchVendorPOs() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'GET',
          redirect: 'follow'
        });
        const data = await response.json();
        if (data.success && data.vendorPOs) {
          validVendorPOs = data.vendorPOs;
        }
      } catch (e) {
        console.error("Failed to fetch PO list", e);
      }
    }

    async function initTesseract() {
      try {
        worker = await Tesseract.createWorker('eng');
      } catch (e) {
        console.error("Tesseract init failed", e);
      }
    }

    function initSpeechRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        speechRecog = new SR();
        speechRecog.continuous = false;
        speechRecog.interimResults = false;
        speechRecog.lang = 'hi-IN'; // Keep understanding Hindi/English speech
      }
    }

    function showStep(step) {
      document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
      document.getElementById('step-' + step).classList.add('active');
    }

    function prevStep(step) {
      stopCamera();
      if (speechRecog) speechRecog.stop();

      if (step === 1) {
        startVoicePO();
      }

      showStep(step);
    }

    function startProcess() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
        return Swal.fire('Setup Incomplete', 'Please update the SCRIPT_URL in the code.', 'error');
      }

      if (validVendorPOs.length === 0) {
        // If data hasn't loaded yet, show a loader and wait briefly
        document.getElementById('init-loader').style.display = 'block';
        fetchVendorPOs().then(() => {
          document.getElementById('init-loader').style.display = 'none';
          showStep(1);
          setTimeout(startVoicePO, 300);
        });
      } else {
        showStep(1);
        setTimeout(startVoicePO, 300);
      }
    }

    function validatePO(fullPoString) {
      if (validVendorPOs.length === 0) return true; // Skip validation if list couldn't be loaded
      return validVendorPOs.includes(fullPoString);
    }

    // Step 1: PO Voice
    function startVoicePO() {
      if (!speechRecog) return Swal.fire('Error', 'Voice input not supported. Please use text.', 'error');

      const icon = document.getElementById("icon-po");
      const msg = document.getElementById("msg-po");
      const wrap = document.getElementById("wrap-po");
      const actions = document.getElementById("actions-po");
      const micBtn = document.getElementById("btn-mic-po");

      wrap.style.display = 'none';
      actions.style.setProperty('display', 'none', 'important');
      micBtn.style.display = 'flex';
      micBtn.classList.add('active-mic');

      speechRecog.onstart = () => {
        icon.classList.add('listening');
        msg.innerHTML = "Listening... Please state the PO Number.";
      };

      speechRecog.onresult = (event) => {
        let transcript = event.results[0][0].transcript.trim();
        let cleanText = transcript.replace(/[^a-zA-Z0-9-]/g, '').toUpperCase();

        if (cleanText.includes("RKD25")) cleanText = cleanText.replace("RKD25", "");
        if (cleanText.startsWith("25")) cleanText = cleanText.substring(2);
        if (cleanText.startsWith("/")) cleanText = cleanText.substring(1);
        if (cleanText.startsWith("-")) cleanText = cleanText.substring(1);

        document.getElementById("inputPO").value = cleanText;

        micBtn.style.display = 'none';
        wrap.style.display = 'block';
        actions.style.setProperty('display', 'flex', 'important');

        const fullPO = "RKD-25/" + cleanText;

        if (!validatePO(fullPO)) {
          msg.innerHTML = `PO Number: <b>${fullPO}</b><br><span style="color:red;">Warning: PO not found in database.</span>`;
          speakText("PO number not found in the list. Please verify.");
        } else {
          msg.innerHTML = `PO Number: <b>${fullPO}</b><br>Is this correct?`;
          speakText(`PO Number ${fullPO}. Confirm.`);
        }
      };

      speechRecog.onerror = (event) => {
        micBtn.style.display = 'none';
        wrap.style.display = 'block';
        actions.style.setProperty('display', 'flex', 'important');
        msg.innerHTML = `Voice unclear (${event.error}). Please type manually or retry.`;
      };

      speechRecog.onend = () => {
        icon.classList.remove('listening');
        micBtn.classList.remove('active-mic');
      };

      try { speechRecog.start(); } catch (e) { }
    }

    function confirmPO() {
      const val = document.getElementById("inputPO").value.trim();
      if (!val) return Swal.fire('Error', 'Please enter a PO Number.', 'warning');

      const fullPO = "RKD-25/" + val;
      if (validVendorPOs.length > 0 && !validatePO(fullPO)) {
        return Swal.fire('Invalid PO', 'The entered PO number does not exist in the database.', 'error');
      }

      showStep(2);
    }

    // Step 2: Invoice
    function startVoiceInvoice() {
      if (!speechRecog) return Swal.fire('Error', 'Voice input not supported.', 'error');

      stopCamera();
      document.getElementById('camera-container').style.display = 'none';
      document.getElementById('inv-actions').style.display = 'none';
      document.getElementById('wrap-inv').style.display = 'none';
      document.getElementById('actions-inv').style.setProperty('display', 'none', 'important');

      const icon = document.getElementById("icon-inv");
      const msg = document.getElementById("msg-inv");

      speechRecog.onstart = () => {
        icon.classList.add('listening');
        msg.innerHTML = "Listening for Invoice Number...";
      };

      speechRecog.onresult = (event) => {
        let text = event.results[0][0].transcript.trim().toUpperCase().replace(/\s+/g, '');
        document.getElementById("inputInvoice").value = text;

        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        msg.innerHTML = `Invoice Number: <b>${text}</b>.<br>Please edit if necessary.`;
        speakText(`Invoice Number ${text} received. Submit.`);
      };

      speechRecog.onerror = (event) => {
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        document.getElementById('inv-actions').style.display = 'grid';
        msg.innerHTML = `Voice unclear (${event.error}). Please type manually.`;
      };

      speechRecog.onend = () => { icon.classList.remove('listening'); };

      try { speechRecog.start(); } catch (e) { }
    }

    // Camera & OCR
    async function startCamera() {
      document.getElementById('inv-actions').style.display = 'none';
      const container = document.getElementById('camera-container');
      const video = document.getElementById('video');
      const msg = document.getElementById('msg-inv');

      container.style.display = 'block';
      msg.innerHTML = "Bring the invoice number into frame and press 'Take Photo'.";

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = videoStream;
      } catch (err) {
        container.style.display = 'none';
        document.getElementById('inv-actions').style.display = 'grid';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        Swal.fire('Error', 'Camera access failed.', 'error');
      }
    }

    function stopCamera() {
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }
    }

    async function captureImage() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      stopCamera();
      document.getElementById('camera-container').style.display = 'none';

      let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let data = imgData.data;
      for (let i = 0; i < data.length; i += 4) {
        let brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
        data[i] = data[i + 1] = data[i + 2] = brightness;
      }
      ctx.putImageData(imgData, 0, 0);

      performOCR(canvas.toDataURL('image/jpeg'));
    }

    async function performOCR(base64) {
      document.getElementById('ocr-loader').style.display = 'block';
      document.getElementById('msg-inv').innerHTML = "Scanning invoice, please wait...";

      try {
        if (!worker) await initTesseract();
        const { data: { text } } = await worker.recognize(base64);

        document.getElementById('ocr-loader').style.display = 'none';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');

        const cleaned = text.split(/\s+/).reduce((a, b) => (/\d/.test(b) && b.length > a.length) ? b : a, "").replace(/[^a-zA-Z0-9-]/g, '').toUpperCase();

        document.getElementById("inputInvoice").value = cleaned;
        document.getElementById('msg-inv').innerHTML = `Invoice Number found: <b>${cleaned}</b>.<br>Please edit if necessary.`;
        speakText("Invoice number captured. Please confirm.");

      } catch (err) {
        document.getElementById('ocr-loader').style.display = 'none';
        document.getElementById('wrap-inv').style.display = 'block';
        document.getElementById('actions-inv').style.setProperty('display', 'flex', 'important');
        Swal.fire('Error', 'Failed to read invoice, please type manually.', 'warning');
      }
    }

    function submitForm() {
      if (SCRIPT_URL === 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
        return Swal.fire('Setup Incomplete', 'Developer: Please update SCRIPT_URL in index.html.', 'error');
      }

      const date = document.getElementById("entryDateRaw").value;
      const poSuffix = document.getElementById("inputPO").value.trim();
      const invoice = document.getElementById("inputInvoice").value.trim();
      const email = document.getElementById("userName").value.trim() || "No Name";

      if (!poSuffix || !invoice) return Swal.fire('Error', 'Please enter all details.', 'error');

      const fullPO = "RKD-25/" + poSuffix;
      if (validVendorPOs.length > 0 && !validatePO(fullPO)) {
        return Swal.fire('Invalid PO', 'The entered PO number does not exist in the database.', 'error');
      }

      const btn = document.getElementById("btn-submit");
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';

      const payload = { entryDate: date, vendorPO: fullPO, invoiceNumber: invoice, email: email };

      fetch(SCRIPT_URL, {
        method: 'POST',
        redirect: 'follow', // Ensures Google Apps Script 302 redirects are handled automatically
        body: JSON.stringify(payload),
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        }
      })
        .then(response => {
          // Apps Script can sometimes return an opaque response due to CORS redirects.
          // We will consider it a success if the fetch promise resolves without a network error.
          if (!response.ok && response.type !== 'opaque') {
            throw new Error("Network error");
          }
          return response.text();
        })
        .then(text => {
          let res = { success: true };
          try { if (text) res = JSON.parse(text); } catch (e) { }

          btn.disabled = false;
          btn.innerHTML = 'Submit <i class="fas fa-paper-plane"></i>';
          if (res.success) {
            Swal.fire({ icon: 'success', title: 'Success!', text: 'Gate Entry recorded.', confirmButtonColor: '#1d4ed8' })
              .then(() => { location.reload(); });
            speakText("Gate entry successfully recorded.");
          } else {
            Swal.fire('Error', res.message || "Submission failed", 'error');
          }
        })
        .catch(err => {
          btn.disabled = false;
          btn.innerHTML = 'Submit <i class="fas fa-paper-plane"></i>';
          // Fallback for CORS opaque response success (some browsers treat the final 200 as opaque if headers are lost)
          Swal.fire({ icon: 'success', title: 'Submitted', text: 'Request sent to server (CORS limited view)', confirmButtonColor: '#1d4ed8' })
            .then(() => { location.reload(); });
        });
    }

    function speakText(text) {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'hi-IN';
        window.speechSynthesis.speak(u);
      }
    }
  </script>
</body>
